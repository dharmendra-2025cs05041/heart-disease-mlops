name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  IMAGE_NAME: heart-disease-api
  REGISTRY: ghcr.io

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Black (formatting check, non-blocking)
      run: black --check src/ tests/ || echo "::warning::Black found formatting deviations"

    - name: Run Flake8 (linting, non-blocking)
      run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503,W293,E402,F541 || echo "::warning::Flake8 found issues"

    - name: Run Pylint (non-blocking)
      run: pylint src/ --disable=C0111,R0903,R0913,C0103,W1203,W1309,R0914,W0621,W0603,W0718,W0707,C0303,C0411,C0412,C0413,W0105,R0801 --max-line-length=120 || echo "::warning::Pylint found issues"

  # Job 2: Unit Tests + Coverage
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download dataset
      run: python scripts/download_data.py

    - name: Run unit tests with coverage
      run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-report=term

    - name: Upload coverage reports
      uses: actions/upload-artifact@v5
      with:
        name: coverage-report
        path: |
          coverage.xml
          htmlcov/
        retention-days: 7

  # Job 3: Model Training
  model-training:
    name: Model Training & Validation
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download dataset
      run: python scripts/download_data.py

    - name: Train models
      run: python src/models/train.py

    - name: Upload model artifacts
      uses: actions/upload-artifact@v5
      with:
        name: trained-models
        path: |
          models/
          mlruns/
        retention-days: 30

    - name: Save training logs
      uses: actions/upload-artifact@v5
      with:
        name: training-logs
        path: '*.log'
        retention-days: 7
        if-no-files-found: ignore

  # Job 4: Docker Build, Smoke Test, and Push to GHCR
  docker-build:
    name: Build, Smoke-Test & Push Docker Image
    runs-on: ubuntu-latest
    needs: model-training
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download model artifacts
      uses: actions/download-artifact@v5
      with:
        name: trained-models

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build Docker image (load locally for smoke test)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: deployment/docker/Dockerfile
        load: true
        tags: heart-disease-api:smoke
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Smoke-test the image
      run: |
        docker run -d -p 8000:8000 --name test-api heart-disease-api:smoke
        for i in $(seq 1 15); do
          if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
            echo "✓ /health responded after ${i}s"
            break
          fi
          sleep 1
        done
        curl -fsS http://localhost:8000/health
        curl -fsS -X POST http://localhost:8000/predict \
          -H 'Content-Type: application/json' \
          -d @scripts/sample_payload.json
        docker stop test-api

    - name: Push Docker image to GHCR
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: deployment/docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha

  # Job 5: Trivy Security Scan of the built image
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build image locally for scanning
      uses: docker/build-push-action@v6
      with:
        context: .
        file: deployment/docker/Dockerfile
        load: true
        tags: heart-disease-api:scan
        cache-from: type=gha

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: heart-disease-api:scan
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
        exit-code: '0'      # report but do not fail the build for HIGH

    - name: Upload Trivy results to Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: trivy-results.sarif

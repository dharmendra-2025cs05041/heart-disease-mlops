# Local end-to-end stack: API + Prometheus + Grafana.
# Bring it up with:   docker compose -f deployment/docker/docker-compose.yml up -d
# Tear it down with:  docker compose -f deployment/docker/docker-compose.yml down

services:

  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    image: heart-disease-api:demo
    container_name: heart-disease-api
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - mlops

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    depends_on:
      - api
    networks:
      - mlops

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - graf-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mlops

networks:
  mlops:
    driver: bridge

volumes:
  prom-data:
  graf-data:
